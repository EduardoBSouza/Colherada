<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Colherada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cor-principal: #8B4513;
            --cor-secundaria: #D2691E;
            --cor-dourado: #DAA520;
            --cor-fundo: #F5F5F0;
            --cor-card: #FFFFFF;
            --sombra: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--cor-fundo) 0%, #E8E8D8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--cor-card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--sombra);
            text-align: center;
        }

        .logo {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--cor-principal);
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--cor-principal);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--cor-principal);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }

        .form-input::placeholder {
            color: #999;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(135deg, var(--cor-principal) 0%, var(--cor-secundaria) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .erro-mensagem {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #C62828;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 0.85rem;
        }

        /* Animações */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeIn 0.5s ease;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading {
            pointer-events: none;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .logo {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🍮</div>
            <h1>Colherada</h1>
            <p class="subtitle">Sistema de Gestão de Vendas</p>

            <div class="erro-mensagem" id="erro-mensagem"></div>

            <form id="form-login" onsubmit="fazerLogin(event)">
                <div class="form-group">
                    <label for="usuario">👤 Usuário</label>
                    <input type="text" 
                           id="usuario" 
                           class="form-input" 
                           placeholder="Digite seu usuário"
                           autocomplete="username"
                           required>
                </div>

                <div class="form-group">
                    <label for="senha">🔒 Senha</label>
                    <input type="password" 
                           id="senha" 
                           class="form-input" 
                           placeholder="Digite sua senha"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    Entrar
                </button>
            </form>

            <div class="footer">
                <p>🍮 Colherada © 2026</p>
            </div>
        </div>
    </div>

    <script>
        // Verificar se já está logado
        if (sessionStorage.getItem('auth_token')) {
            window.location.href = 'dashboard.html';
        }

        // Fazer login
        async function fazerLogin(event) {
            event.preventDefault();
            
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value;
            const btnLogin = document.getElementById('btn-login');
            const erroMensagem = document.getElementById('erro-mensagem');
            
            // Esconder erro anterior
            erroMensagem.style.display = 'none';
            
            // Desabilitar botão e mostrar loading
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="spinner"></span> Entrando...';
            
            try {
                const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:5000'
                    : '';
                
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ usuario, senha })
                });
                
                const resultado = await response.json();
                
                if (resultado.success) {
                    // Salvar token e redirecionar
                    sessionStorage.setItem('auth_token', resultado.token || 'authenticated');
                    sessionStorage.setItem('usuario', usuario);
                    sessionStorage.setItem('nome_usuario', resultado.nome || usuario);
                    
                    // Animação de sucesso
                    btnLogin.innerHTML = '✅ Sucesso!';
                    btnLogin.style.background = '#4CAF50';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    mostrarErro(resultado.message || 'Usuário ou senha incorretos');
                    resetarBotao();
                }
            } catch (error) {
                console.error('Erro no login:', error);
                mostrarErro('Erro ao conectar com o servidor. Tente novamente.');
                resetarBotao();
            }
        }
        
        // Mostrar mensagem de erro
        function mostrarErro(mensagem) {
            const erroMensagem = document.getElementById('erro-mensagem');
            erroMensagem.textContent = mensagem;
            erroMensagem.style.display = 'block';
        }
        
        // Resetar botão
        function resetarBotao() {
            const btnLogin = document.getElementById('btn-login');
            btnLogin.disabled = false;
            btnLogin.innerHTML = 'Entrar';
        }
        
        // Focar no campo de usuário
        document.getElementById('usuario').focus();
    </script>
</body>
</html>
